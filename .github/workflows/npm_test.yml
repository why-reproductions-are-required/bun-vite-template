name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@1f9173063cf4f9723bec93c4f2094b064ff7640f
        with:
          cache: true
      - name: Install dependencies
        run: vp install --frozen-lockfile
      - name: Validate
        run: vp run validate
